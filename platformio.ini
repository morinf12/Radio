; PlatformIO project config - ESP32-S2 Internet Radio
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor

[platformio]
src_dir = .

; Target: Wemos MiniKit for ESP32 (ESP32-D0WDQ6 - 4MB flash, no PSRAM)
[env:mhetesp32minikit]
platform      = espressif32
board         = mhetesp32minikit
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; min_spiffs.csv: ~1.9 MB per OTA app slot, ~150 KB SPIFFS. Requires a one-time
; USB reflash to update the on-flash partition table; subsequent updates can
; still go over OTA.
board_build.partitions = min_spiffs.csv

build_flags =
  -D CORE_DEBUG_LEVEL=2

extra_scripts = pre:version_build.py

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
  ; Last 3.0.x release - still uses Arduino 2.x APIs (not 3.x NetworkClient).
  ; Requires arduino-esp32 >= 2.0.8 (setPinout() runtime check).
  https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12
