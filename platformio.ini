; PlatformIO project config - ESP32-S2 Internet Radio
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor

[platformio]
src_dir = .

; Target: Wemos / Lolin S2 Mini (ESP32-S2FN4R2 - 4MB flash, 2MB PSRAM)
[env:lolin_s2_mini]
platform      = espressif32
board         = lolin_s2_mini
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

board_build.partitions = huge_app.csv
board_build.f_cpu      = 240000000L
board_build.psram_type = qspi
board_upload.flash_size = 4MB

; Native USB CDC + 2MB PSRAM (used by ESP32-audioI2S ring buffer).
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D CONFIG_SPIRAM_USE_MALLOC=1
  -D CORE_DEBUG_LEVEL=2

extra_scripts = pre:version_build.py

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
  https://github.com/schreibfaul1/ESP32-audioI2S.git
