; PlatformIO project config - ESP32-S2 Internet Radio
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor

[platformio]
src_dir = .

; Target: Wemos / Lolin S2 Mini (ESP32-S2FN4R2 - 4MB flash, 2MB PSRAM)
[env:lolin_s2_mini]
platform      = espressif32
board         = lolin_s2_mini
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600

; Use same partition table and bootloader as ..\horloge (framework defaults)
board_build.partitions = default.csv

; Native USB CDC + 2MB PSRAM (used by ESP32-audioI2S ring buffer).
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_HAS_PSRAM
  -D CONFIG_SPIRAM_USE_MALLOC=1
  -D CORE_DEBUG_LEVEL=2

extra_scripts = pre:version_build.py

lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  adafruit/Adafruit GFX Library @ ^1.11.9
  adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
  ; Pinned to 3.0.12 (last 3.0.x release): later versions require either
  ; C++20 <span> or arduino-esp32 3.x (NetworkClient.h), neither of which
  ; is provided by platform espressif32 5.3.0 / arduino-esp32 2.0.6.
  https://github.com/schreibfaul1/ESP32-audioI2S.git#3.0.12
